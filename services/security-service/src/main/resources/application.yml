server:
  port: 8081

spring:
  application:
    name: security-service
  datasource:
    url: jdbc:postgresql://localhost:5432/security_db
    username: retail_admin
    password: retail_pass
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

security:
  jwt:
    secret: "change-this-to-a-long-random-secret-value-in-production-env-vars"
    access-token-validity-seconds: 900
    refresh-token-validity-seconds: 604800

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
