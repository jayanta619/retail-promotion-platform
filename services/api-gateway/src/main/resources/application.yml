server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: security-service
          uri: lb://security-service
          predicates:
            - Path=/api/v1/auth/**
        - id: promotion-command-service
          uri: lb://promotion-command-service
          predicates:
            - Path=/api/v1/promotions/commands/**
        - id: promotion-query-service
          uri: lb://promotion-query-service
          predicates:
            - Path=/api/v1/promotions/**
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products/**
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/v1/inventory/**
        - id: pricing-service
          uri: lb://pricing-service
          predicates:
            - Path=/api/v1/pricing/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/v1/admin/**
        - id: actuator-route
          uri: http://localhost:8080
          predicates:
              - Path=/actuator/**

security:
  jwt:
    secret: "change-this-to-a-long-random-secret-value-in-production-env-vars"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
