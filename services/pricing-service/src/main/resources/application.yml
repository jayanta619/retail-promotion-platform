server:
  port: 8086

spring:
  application:
    name: pricing-service

  datasource:
    url: jdbc:postgresql://localhost:5432/pricing_db
    username: retail_admin
    password: retail_pass
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
