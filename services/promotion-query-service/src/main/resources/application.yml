server:
  port: 8083

spring:
  application:
    name: promotion-query-service
  elasticsearch:
    uris: http://elasticsearch:9200
  data:
    redis:
      host: elasticsearch
      port: 6379
  cache:
    type: redis
  Kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: promotion-query-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.retailplatform.promotion.command.event,com.retailplatform.promotion.query.event"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.retailplatform.promotion.query.event.PromotionCreatedEvent

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
