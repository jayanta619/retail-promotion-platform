name: CI Build and Test

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven (all modules)
        run: mvn -B clean install -DskipTests

      - name: Run unit and integration tests
        run: mvn -B test

      - name: Package
        run: mvn -B package -DskipTests

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        service:
          - discovery-server
          - config-server
          - api-gateway
          - security-service
          - promotion-command-service
          - promotion-query-service
          - product-service
          - inventory-service
          - pricing-service
          - order-service
          - notification-service
          - audit-service
          - admin-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build service jar
        run: mvn -B -pl services/${{ matrix.service }} -am clean package -DskipTests

      - name: Build Docker image
        run: docker build -t retailplatform/${{ matrix.service }}:latest services/${{ matrix.service }}
