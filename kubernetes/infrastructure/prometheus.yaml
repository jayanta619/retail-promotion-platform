apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: retail-promotion-platform

data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:

      - job_name: prometheus

        static_configs:
          - targets:
              - localhost:9090

      - job_name: config-server
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - config-server:8888

      - job_name: discovery-server
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - discovery-server:8761

      - job_name: api-gateway
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - api-gateway:8080

      - job_name: security-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - security-service:8081

      - job_name: promotion-command-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - promotion-command-service:8082

      - job_name: promotion-query-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - promotion-query-service:8083

      - job_name: product-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - product-service:8084

      - job_name: inventory-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - inventory-service:8085

      - job_name: pricing-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - pricing-service:8086

      - job_name: order-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - order-service:8087

      - job_name: notification-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - notification-service:8088

      - job_name: audit-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - audit-service:8089

      - job_name: admin-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - admin-service:8090

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: retail-promotion-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: prometheus

  template:
    metadata:
      labels:
        app: prometheus

    spec:
      containers:

        - name: prometheus

          image: prom/prometheus:latest

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 9090

          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"

          volumeMounts:

            - name: prometheus-config
              mountPath: /etc/prometheus

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"

            limits:
              cpu: "500m"
              memory: "1Gi"

          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090

            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090

            initialDelaySeconds: 60
            periodSeconds: 20

      volumes:

        - name: prometheus-config
          configMap:
            name: prometheus-config

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: retail-promotion-platform

spec:

  selector:
    app: prometheus

  ports:

    - name: http

      port: 9090

      targetPort: 9090

  type: ClusterIP