apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: retail-promotion-platform
spec:
  selector:
    app: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: retail-promotion-platform
spec:
  serviceName: elasticsearch

  replicas: 1

  selector:
    matchLabels:
      app: elasticsearch

  template:
    metadata:
      labels:
        app: elasticsearch

    spec:

      securityContext:
        fsGroup: 1000

      initContainers:

        - name: fix-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /usr/share/elasticsearch/data
              chown -R 1000:1000 /usr/share/elasticsearch/data

          securityContext:
            runAsUser: 0

          volumeMounts:
            - name: elasticsearch-storage
              mountPath: /usr/share/elasticsearch/data

      containers:

        - name: elasticsearch

          image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4

          imagePullPolicy: IfNotPresent

          securityContext:
            runAsUser: 1000
            runAsGroup: 1000

          ports:

            - containerPort: 9200

            - containerPort: 9300

          env:

            - name: discovery.type
              value: single-node

            - name: cluster.name
              value: retail-es

            - name: node.name
              value: elasticsearch

            - name: xpack.security.enabled
              value: "false"

            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"

          volumeMounts:

            - name: elasticsearch-storage
              mountPath: /usr/share/elasticsearch/data

          resources:

            requests:
              cpu: 500m
              memory: 1Gi

            limits:
              cpu: "1"
              memory: 2Gi

          readinessProbe:

            httpGet:
              path: /
              port: 9200

            initialDelaySeconds: 90

            periodSeconds: 10

            timeoutSeconds: 5

            failureThreshold: 12

          livenessProbe:

            httpGet:
              path: /
              port: 9200

            initialDelaySeconds: 120

            periodSeconds: 20

            timeoutSeconds: 5

            failureThreshold: 10

  volumeClaimTemplates:

    - metadata:
        name: elasticsearch-storage

      spec:

        accessModes:

          - ReadWriteOnce

        resources:

          requests:
            storage: 20Gi