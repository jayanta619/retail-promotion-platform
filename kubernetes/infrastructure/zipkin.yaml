apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: retail-promotion-platform
  labels:
    app: zipkin

spec:
  replicas: 1

  selector:
    matchLabels:
      app: zipkin

  template:
    metadata:
      labels:
        app: zipkin

    spec:
      containers:

        - name: zipkin

          image: openzipkin/zipkin:latest

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 9411

          env:
            - name: STORAGE_TYPE
              value: mem

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"

            limits:
              cpu: "500m"
              memory: "1Gi"

          readinessProbe:
            httpGet:
              path: /health
              port: 9411

            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /health
              port: 9411

            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

---
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: retail-promotion-platform

spec:

  selector:
    app: zipkin

  ports:

    - name: http

      port: 9411

      targetPort: 9411

  type: ClusterIP