apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: retail-promotion-platform
  labels:
    app: kafka

spec:
  replicas: 1
  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: kafka

  template:
    metadata:
      labels:
        app: kafka

    spec:
      containers:

        - name: kafka

          image: confluentinc/cp-kafka:7.6.0

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 9092

          env:

            - name: KAFKA_BROKER_ID
              value: "1"

            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"

            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT

            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:9092

            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092

            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT

            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"

            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"

            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"

            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"

            limits:
              cpu: "1000m"
              memory: "1Gi"

          readinessProbe:
            tcpSocket:
              port: 9092

            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            tcpSocket:
              port: 9092

            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6

---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: retail-promotion-platform

spec:

  selector:
    app: kafka

  ports:

    - name: kafka

      port: 9092

      targetPort: 9092

  type: ClusterIP