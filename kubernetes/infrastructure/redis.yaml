apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: retail-promotion-platform
  labels:
    app: redis

spec:
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:

        - name: redis

          image: redis:7-alpine

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 6379

          args:
            - redis-server
            - --appendonly
            - "yes"

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping

            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping

            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

          volumeMounts:

            - name: redis-storage
              mountPath: /data

      volumes:

        - name: redis-storage
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: retail-promotion-platform

spec:

  selector:
    app: redis

  ports:

    - name: redis

      port: 6379

      targetPort: 6379

  type: ClusterIP