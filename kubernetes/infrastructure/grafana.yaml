apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: retail-promotion-platform
type: Opaque
stringData:
  admin-user: admin
  admin-password: admin123

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-storage
  namespace: retail-promotion-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: retail-promotion-platform
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: retail-promotion-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: grafana

  template:

    metadata:
      labels:
        app: grafana

    spec:

      securityContext:
        fsGroup: 472

      initContainers:

        - name: volume-permission

          image: busybox:1.36

          command:
            - sh
            - -c
            - |
              mkdir -p /var/lib/grafana
              chown -R 472:472 /var/lib/grafana

          securityContext:
            runAsUser: 0

          volumeMounts:

            - name: grafana-storage
              mountPath: /var/lib/grafana

      containers:

        - name: grafana

          image: grafana/grafana:latest

          imagePullPolicy: IfNotPresent

          securityContext:
            runAsUser: 472
            runAsGroup: 472

          env:

            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-user

            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-password

            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"

          ports:
            - containerPort: 3000

          volumeMounts:

            - name: grafana-storage
              mountPath: /var/lib/grafana

          readinessProbe:

            httpGet:
              path: /api/health
              port: 3000

            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:

            httpGet:
              path: /api/health
              port: 3000

            initialDelaySeconds: 60
            periodSeconds: 20

          resources:

            requests:
              cpu: 250m
              memory: 512Mi

            limits:
              cpu: 500m
              memory: 1Gi

      volumes:

        - name: grafana-storage

          persistentVolumeClaim:
            claimName: grafana-storage