apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-service
  namespace: retail-promotion-platform
  labels:
    app: security-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: security-service
  template:
    metadata:
      labels:
        app: security-service
    spec:
      containers:
        - name: security-service
          image: retailplatformacr.azurecr.io/security-service:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-server:8761/eureka/"
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: security-service
  namespace: retail-promotion-platform
spec:
  selector:
    app: security-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
